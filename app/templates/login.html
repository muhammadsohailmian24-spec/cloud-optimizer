<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | AI Cloud Resource Optimizer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-panel">
      <h1>AI Cloud Optimizer</h1>
      <p class="text-secondary">Admin dashboard for monitoring cost, performance and resource efficiency.</p>
      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <label class="form-label" for="username">Username</label>
        <input class="form-control mb-3" id="username" name="username" value="admin" required>
        <label class="form-label" for="password">Password</label>
        <input class="form-control mb-3" id="password" name="password" type="password" value="admin123" required>
        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
